name: Build mapping

on:
  push:
    branches:
      - main
    paths:
      - 'subtitles/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm i

      - name: Rebuild mapping.json + static addon (docs/)
        run: |
          node scripts/build-mapping.js
          node scripts/build-static.js

      - name: Commit regenerated files if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rebuild mapping.json + docs from subtitles'
          file_pattern: 'mapping.json docs/**'
