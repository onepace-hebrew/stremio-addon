name: Build mapping

on:
  push:
    branches:
      - main
    paths:
      - 'subtitles/**'
  workflow_dispatch: {}

permissions: {}

jobs:
  build-mapping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # zizmor: ignore[artipacked] git-auto-commit needs the persisted token to push
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm i

      - name: Rebuild mapping.json + static addon (docs/)
        run: |
          node scripts/build-mapping.js
          node scripts/build-static.js

      - name: Commit regenerated files if changed
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: 'chore: rebuild mapping.json + docs from subtitles'
          file_pattern: 'mapping.json docs/**'
